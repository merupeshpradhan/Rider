<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Sharing Application</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        #map {
            height: 90vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        var map = L.map('map').setView([51.505, -0.09], 13);
        // var map = L.map('map').setView([21.8364, 84.3936], 14);
        // var map = L.map('map').setView([21.7483, 84.3435], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        function getUsersCurrentLocation() {
            return new Promise((res, rej) => {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            console.log(`Got user's Location`, position);
                            const latitude = position.coords.latitude;
                            const longitude = position.coords.longitude;
                            res({ latitude, longitude })
                        },
                        (err) => {
                            rej(err)
                        },
                        { enableHighAccuracy: true }
                    )
                } else {
                    alert('Geolocation is not available in this browser')
                }
            })

        }

        async function main() {
            const userLocation = await getUsersCurrentLocation();
            L.marker([userLocation.latitude, userLocation.longitude])
                .addTo(map)
                .bindPopup('You are here')
        }

        window.addEventListener('load', main)
    </script>
</body>

</html>
